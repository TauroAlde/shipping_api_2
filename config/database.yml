default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: shipping_api_development

test:
  <<: *default
  database: shipping_api_test

production:
  primary:
    url: <%= ENV['DATABASE_URL'] %>

  queue:
    url: <%= ENV['DATABASE_URL'] %>

  cable:
    url: <%= ENV['DATABASE_URL'] %>
